<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#F4F6FB" />
<title>합격노트 · 텔레마케팅관리사 실기</title>
<style>
@font-face {
  font-family: 'SUIT Variable';
  font-weight: 100 900;
  font-style: normal;
  src: url('fonts/SUIT-Variable.woff2') format('woff2-variations');
  font-display: swap;
}

:root{
  --serif:'SUIT Variable', serif;
  --sans:'SUIT Variable', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  --radius:22px; --radius-sm:15px;
  --maxw:560px;
}

/* ☀ 라이트 — 기출문제 PDF와 동일한 청색 액센트 기반 클리엔 톤 */
.theme-light{
  --bg:#F4F6FB; --bg-glow:#EDF2FB;
  --surface:#FFFFFF; --surface2:#F1F3F8;
  --ink:#14161C; --muted:#8B90A0; --line:#E3E6EE;
  --accent:#2A59C3; --accent-deep:#1E3F91; --accent-soft:#EDF2FB;
  --wood:#5B6B8C; --wood-soft:#EEF1F6;
  --shadow:0 8px 30px rgba(30,45,90,.07);
  --shadow-pop:0 18px 50px rgba(30,45,90,.14);
}
/* 🌙 다크 — 같은 블루 액센트의 네이브이 버전 */
.theme-dark{
  --bg:#141416; --bg-glow:#1A1A1D;
  --surface:#1D1D20; --surface2:#26262A;
  --ink:#EDEDEF; --muted:#8C8C93; --line:#303034;
  --accent:#4C7BE0; --accent-deep:#8FB0F0; --accent-soft:#1C2740;
  --wood:#828288; --wood-soft:#242427;
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --shadow-pop:0 18px 50px rgba(0,0,0,.55);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;margin:0;}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  font-size:15px; line-height:1.6; letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;letter-spacing:-.01em;outline:none;}
input,textarea{font-family:inherit;outline:none;}

.app-root{min-height:100vh;width:100%;position:relative;overflow-x:hidden;
  background:var(--bg); color:var(--ink); transition:background .4s,color .4s;}
/* 배경 — PDF처럼 플랻하고 깨끗하게, 은은한 청색 글로우만 */
.app-root::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background: radial-gradient(120% 80% at 78% -8%, var(--bg-glow) 0%, transparent 55%);
  opacity:.6;transition:opacity .4s;}
.app-root>*{position:relative;z-index:1;}

/* ───────── 온보딩 ───────── */
.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 26px;text-align:center;}
.ob-badge{font-size:11.5px;letter-spacing:.22em;color:var(--accent-deep);background:var(--accent-soft);
  padding:7px 16px;border-radius:30px;font-weight:700;}
.ob-title{font-family:var(--serif);font-size:54px;font-weight:700;margin:20px 0 4px;letter-spacing:.01em;}
.ob-sub{color:var(--muted);line-height:1.8;font-size:15px;margin:0;}
.ob-dday{margin:28px 0 32px;font-size:15px;}
.ob-dday b{font-family:var(--serif);color:var(--accent);font-size:26px;margin-left:4px;}
.ob-form{width:100%;max-width:330px;}
.ob-label{display:block;text-align:left;font-size:13px;color:var(--muted);margin-bottom:8px;}
.ob-input{width:100%;padding:15px 16px;border-radius:14px;border:1.5px solid var(--line);
  background:var(--surface);color:var(--ink);font-size:16px;transition:border .2s;}
.ob-input:focus{border-color:var(--accent);}
.ob-btn{width:100%;margin-top:14px;padding:16px;border-radius:14px;background:var(--accent);color:#fff;
  font-size:16px;font-weight:700;transition:transform .1s,filter .2s;}
.ob-btn:active{transform:scale(.98);}
.ob-foot{margin-top:24px;font-size:12px;color:var(--muted);line-height:1.6;}

/* ───────── 상단바 ───────── */
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:color-mix(in srgb,var(--bg) 80%,transparent);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
.tb-left{display:flex;align-items:center;gap:9px;}
.tb-logo{font-family:var(--serif);font-weight:700;font-size:21px;letter-spacing:.01em;}
.tb-dday{font-size:13px;font-weight:700;color:#fff;background:var(--accent);padding:4px 11px;border-radius:20px;}
.tb-right{display:flex;gap:4px;}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;
  color:var(--ink);transition:background .2s;}
.icon-btn:active{background:var(--surface2);}

/* ───────── 화면 ───────── */
.screen{padding:20px 16px 110px;max-width:var(--maxw);margin:0 auto;}
.fade{animation:fade .4s ease both;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.view-title{font-family:var(--serif);font-size:26px;font-weight:700;margin:4px 0 4px;}
.view-sub{color:var(--muted);font-size:14px;margin:0 0 20px;}
.center-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:58vh;}

/* ───────── 홈 ───────── */
.greet{color:var(--muted);font-size:15px;margin:2px 0 0;}
.greet-name{font-family:var(--serif);font-size:28px;font-weight:700;margin:2px 0 20px;}
.dday-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:24px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;animation:rise .5s both;}
.dday-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);position:relative;}
.dday-date{font-weight:700;color:var(--accent-deep);background:var(--accent-soft);padding:4px 11px;border-radius:20px;font-size:12.5px;}
.dday-big{font-family:var(--serif);font-size:56px;font-weight:700;line-height:1.05;margin:8px 0 16px;
  color:var(--accent-deep);position:relative;}
.dday-big small{font-size:24px;color:var(--muted);margin-left:6px;}
.dday-bar{height:8px;border-radius:10px;background:var(--surface2);overflow:hidden;position:relative;}
.dday-fill{height:100%;background:var(--accent);border-radius:10px;transition:width .8s;}
.dday-msg{font-size:13.5px;color:var(--muted);margin:13px 0 0;position:relative;}

.stat-row{display:flex;align-items:center;gap:18px;background:var(--surface);border:1px solid var(--line);
  border-radius:22px;padding:18px;margin-top:14px;box-shadow:var(--shadow);animation:rise .5s .05s both;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s;}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-label b{font-family:var(--serif);font-size:21px;}
.ring-label span{font-size:10px;color:var(--muted);}
.stat-list{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;flex:1;}
.stat{display:flex;flex-direction:column;}
.stat b{font-family:var(--serif);font-size:21px;line-height:1;}
.stat span{font-size:11px;color:var(--muted);margin-top:4px;}
.stat.ok b{color:var(--accent);}
.stat.no b{color:var(--accent-deep);}

.quick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.q-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px 16px;
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left;box-shadow:var(--shadow);
  transition:transform .12s;animation:rise .5s both;}
.q-card:active{transform:scale(.97);}
.q-emoji{font-size:23px;margin-bottom:7px;}
.q-card b{font-size:15.5px;}
.q-desc{font-size:12px;color:var(--muted);}
.q-card.note{grid-column:span 2;flex-direction:row;align-items:center;gap:14px;}
.q-card.note .q-emoji{margin:0;}
.q-card .bar{height:3px;width:34px;border-radius:3px;background:var(--accent);margin-bottom:9px;}
.q-card.b .bar{background:var(--wood);}
.q-card.c .bar{background:#6E8FDB;}
.q-card.d .bar{background:#16294F;}

.tip{margin-top:16px;background:var(--accent-soft);border-radius:16px;padding:16px 18px;
  font-size:13.5px;line-height:1.75;color:var(--accent-deep);animation:rise .5s .1s both;}
.tip b{font-weight:700;}

/* ───────── 요약 ───────── */
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sec-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px 15px;
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;text-align:left;box-shadow:var(--shadow);
  transition:transform .12s,border-color .2s;animation:rise .45s both;}
.sec-card:active{transform:scale(.97);}
.sec-ico{font-size:21px;color:var(--accent);}
.sec-ico.big{font-size:26px;}
.sec-card b{font-size:14.5px;line-height:1.4;}
.sec-count{font-size:11.5px;color:var(--muted);}

.back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:14px;
  margin-bottom:16px;padding:6px 4px;}
.sec-head{display:flex;align-items:center;gap:11px;margin-bottom:16px;}
.sec-head h2{font-family:var(--serif);font-size:23px;font-weight:700;margin:0;}

.acc-list{display:flex;flex-direction:column;gap:11px;}
.acc{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden;transition:border-color .2s;}
.acc.open{border-color:var(--accent);}
.acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:17px 18px;font-size:15px;font-weight:600;text-align:left;}
.acc-head .star{font-size:11px;color:var(--accent-deep);}
.chev{color:var(--muted);transition:transform .25s;font-size:17px;flex-shrink:0;}
.acc.open .chev{transform:rotate(180deg);}
.acc-body{margin:0;padding:4px 19px 19px;list-style:none;display:flex;flex-direction:column;gap:14px;animation:fade .25s;}
.acc-body li{position:relative;padding-left:18px;font-size:14px;line-height:1.88;color:var(--ink);}
.acc-body li::before{content:"";position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--accent);}
.acc-body li b{color:var(--accent-deep);font-weight:700;}

.mini-table{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;
  margin-bottom:14px;box-shadow:var(--shadow);}
.mt-title{font-size:14px;font-weight:700;margin-bottom:11px;color:var(--accent-deep);}
.mt-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.mini-table table{border-collapse:collapse;width:100%;min-width:380px;font-size:12.5px;}
.mini-table th,.mini-table td{padding:8px 9px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap;}
.mini-table thead th{background:var(--accent-soft);color:var(--accent-deep);font-weight:700;}
.mini-table .th-first,.mini-table .row-h{background:var(--surface2);font-weight:600;text-align:left;position:sticky;left:0;}
.mini-table .row-h{color:var(--muted);}

/* ───────── 문제 ───────── */
.catbtn{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:16px 18px;
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left;margin-bottom:11px;
  box-shadow:var(--shadow);transition:transform .12s;}
.catbtn:active{transform:scale(.98);}
.catbtn b{font-size:15.5px;}
.catbtn span{font-size:12px;color:var(--muted);}
.catbtn.feat{background:var(--accent-soft);border:1px solid var(--line);border-left:3px solid var(--accent);}
.catbtn.feat b{color:var(--accent-deep);}
.catbtn.feat span{color:var(--muted);}
.catbtn.feat .tagnew{display:inline-block;font-size:10px;font-weight:800;background:var(--accent);color:#fff;
  padding:2px 8px;border-radius:20px;margin-bottom:6px;letter-spacing:.05em;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.cat-grid .catbtn{margin-bottom:0;}

.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.quiz-cat{font-size:12px;font-weight:700;color:var(--accent-deep);background:var(--accent-soft);
  padding:4px 11px;border-radius:20px;}
.quiz-prog{font-size:13px;color:var(--muted);}
.quiz-progbar{height:5px;background:var(--surface2);border-radius:8px;overflow:hidden;margin-bottom:18px;}
.quiz-progbar div{height:100%;background:var(--accent);border-radius:8px;transition:width .3s;}

.qcard{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow);}
.q-yr{display:inline-block;font-family:var(--serif);font-size:13px;color:var(--wood);font-weight:700;margin-bottom:10px;}
.q-yr.y26{color:var(--accent-deep);}
.q-text{font-size:18px;line-height:1.65;font-weight:500;margin:0 0 16px;word-break:keep-all;}
.q-prev{display:inline-block;font-size:11.5px;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.q-prev.ok{color:var(--accent);background:var(--accent-soft);}
.q-prev.no{color:var(--accent-deep);background:var(--accent-soft);}
.reveal-btn{width:100%;margin-top:4px;padding:15px;border-radius:13px;background:var(--accent-soft);
  color:var(--accent-deep);font-weight:700;font-size:15px;transition:transform .1s;}
.reveal-btn:active{transform:scale(.98);}
.answer{margin-top:18px;padding-top:18px;border-top:1px dashed var(--line);animation:fade .25s;}
.ans-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;}
.ans-text{font-size:15.5px;line-height:1.8;margin:0 0 18px;white-space:pre-line;}
.grade-row{display:flex;gap:10px;}
.grade{flex:1;padding:15px;border-radius:13px;font-weight:700;font-size:15px;transition:transform .1s;}
.grade:active{transform:scale(.97);}
.grade.o{background:var(--accent);color:#fff;}
.grade.x{background:var(--surface2);color:var(--accent-deep);border:1.5px solid var(--accent-soft);}
.skip-btn{display:block;margin:16px auto 0;color:var(--muted);font-size:13.5px;padding:8px;}

.done-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:34px 26px;
  text-align:center;box-shadow:var(--shadow);width:100%;max-width:340px;}
.done-emoji{font-size:42px;}
.done-card h2{font-family:var(--serif);font-size:22px;margin:10px 0 4px;}
.done-rate{font-family:var(--serif);font-size:48px;font-weight:700;color:var(--accent);}
.done-line{font-size:14px;margin:4px 0;}
.done-msg{font-size:13.5px;color:var(--muted);margin:6px 0 20px;line-height:1.6;}
.ghost-btn{width:100%;margin-top:8px;padding:13px;border-radius:13px;color:var(--muted);font-size:14px;}

/* ───────── 오답 ───────── */
.empty{text-align:center;}
.empty-emoji{font-size:46px;}
.empty h2{font-family:var(--serif);font-size:22px;margin:12px 0 6px;}
.empty p{color:var(--muted);font-size:14px;line-height:1.6;max-width:260px;margin:0 auto;}
.wrong-list{display:flex;flex-direction:column;gap:10px;}
.wrong-item{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden;
  border-left:3px solid var(--accent);}
.wrong-q{width:100%;text-align:left;padding:15px 16px;display:flex;flex-direction:column;gap:6px;}
.wrong-cat{font-size:11px;color:var(--accent-deep);font-weight:700;}
.wrong-text{font-size:14.5px;line-height:1.55;font-weight:500;word-break:keep-all;}
.wrong-a{padding:0 16px 16px;animation:fade .25s;}
.wrong-a p{font-size:14.5px;line-height:1.8;margin:0 0 12px;padding-top:12px;border-top:1px dashed var(--line);white-space:pre-line;}
.resolve{width:100%;padding:12px;border-radius:11px;background:var(--accent-soft);color:var(--accent-deep);
  font-weight:700;font-size:14px;}

/* ───────── 암기 ───────── */
.memo-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;}
.memo-tab{flex-shrink:0;padding:9px 16px;border-radius:22px;background:var(--surface2);color:var(--muted);
  font-size:13.5px;font-weight:600;transition:all .2s;}
.memo-tab.on{background:var(--accent);color:#fff;}

.deck{display:flex;flex-direction:column;align-items:center;}
.deck-hint{font-size:13px;color:var(--muted);margin:0 0 14px;}
.flash{width:100%;max-width:360px;height:236px;perspective:1200px;cursor:pointer;}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d;}
.flash.flip .flash-inner{transform:rotateY(180deg);}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--line);}
.flash-face.front{background:var(--surface);}
.flash-front-text{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--accent-deep);letter-spacing:.03em;}
.flash-tap{position:absolute;bottom:18px;font-size:11.5px;color:var(--muted);}
.flash-face.back{background:var(--accent);color:#fff;transform:rotateY(180deg);}
.flash-back-text{font-size:16.5px;line-height:1.75;font-weight:500;}
.deck-nav{display:flex;gap:12px;margin-top:20px;width:100%;max-width:360px;}
.deck-btn{flex:1;padding:14px;border-radius:13px;background:var(--surface);border:1px solid var(--line);
  font-weight:600;font-size:14.5px;transition:transform .1s;}
.deck-btn:active{transform:scale(.97);}

.cmp-list,.seq-list{display:flex;flex-direction:column;gap:11px;}
.cmp{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;
  box-shadow:var(--shadow);animation:rise .4s both;}
.cmp-title{font-size:14px;font-weight:700;margin-bottom:11px;}
.cmp-row{display:flex;align-items:stretch;gap:9px;}
.cmp-side{flex:1;border-radius:12px;padding:11px 12px;display:flex;flex-direction:column;gap:3px;}
.cmp-side.l{background:var(--accent-soft);}
.cmp-side.r{background:var(--wood-soft);}
.cmp-side b{font-size:13.5px;}
.cmp-side.l b{color:var(--accent-deep);}
.cmp-side.r b{color:#445070;}
.theme-dark .cmp-side.r b{color:var(--wood);}
.cmp-side span{font-size:12px;line-height:1.55;color:var(--ink);}
.cmp-vs{align-self:center;font-size:11px;font-weight:700;color:var(--muted);}

.seq{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;
  box-shadow:var(--shadow);animation:rise .4s both;}
.seq-title{font-size:14px;font-weight:700;margin-bottom:11px;}
.seq-chips{display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.seq-chip-wrap{display:inline-flex;align-items:center;gap:6px;}
.seq-chip{background:var(--accent-soft);color:var(--accent-deep);font-size:12.5px;font-weight:600;
  padding:6px 11px;border-radius:9px;}
.seq-arrow{color:var(--muted);font-size:12px;}

/* ───────── 나만의 노트 ───────── */
.note-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.note-saved{font-size:12px;color:var(--muted);}
.note-area{width:100%;min-height:58vh;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:20px;font-size:15px;line-height:1.85;color:var(--ink);
  box-shadow:var(--shadow);resize:vertical;}
.note-area::placeholder{color:var(--muted);}

/* ───────── 탭바 ───────── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(16px);border-top:1px solid var(--line);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);
  position:relative;transition:color .2s;}
.tab span{font-size:10px;font-weight:500;}
.tab.on{color:var(--accent);}
.tab.on span{font-weight:700;}
.tab-badge{position:absolute;top:0;right:calc(50% - 20px);background:var(--accent-deep);color:#fff;font-size:9px;
  min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  padding:0 3px;font-weight:700;}

/* ───────── 설정 시트 ───────── */
.sheet-backdrop{position:fixed;inset:0;z-index:50;background:rgba(20,15,8,.45);display:flex;align-items:flex-end;animation:fade .2s;}
.sheet{width:100%;max-width:var(--maxw);margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;
  padding:14px 22px calc(26px + env(safe-area-inset-bottom));animation:slideup .3s cubic-bezier(.2,.8,.2,1);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.sheet-handle{width:40px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 16px;}
.sheet-title{font-family:var(--serif);font-size:20px;margin:0 0 14px;}
.sheet-row{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.sheet-row span{color:var(--muted);}
.sheet-link{padding:14px 0;font-size:13.5px;color:var(--muted);}
.sheet-info{font-size:12px;line-height:1.8;color:var(--muted);background:var(--surface2);border-radius:12px;padding:14px;margin:0 0 10px;}
.sheet-reset{width:100%;padding:13px;border-radius:13px;background:var(--surface2);color:var(--accent-deep);
  font-weight:700;font-size:14px;margin-bottom:8px;border:1px solid var(--line);}
.sheet-close{width:100%;margin-top:4px;padding:15px;border-radius:14px;background:var(--accent);color:#fff;font-weight:700;font-size:15px;}

/* 시험일 선택기 */
.exam-picker{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;margin:2px 0 4px;-webkit-overflow-scrolling:touch;}
.exam-chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:52px;
  padding:9px 8px;border-radius:13px;background:var(--surface2);border:1px solid var(--line);
  color:var(--muted);transition:background .18s,border-color .18s,color .18s;}
.exam-chip:active{transform:scale(.96);}
.exam-chip .ec-wd{font-size:10.5px;}
.exam-chip .ec-md{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink);}
.exam-chip.on{background:var(--accent);border-color:var(--accent);}
.exam-chip.on .ec-wd,.exam-chip.on .ec-md{color:#fff;}
.exam-note{font-size:11.5px;color:var(--muted);line-height:1.65;margin:0 0 12px;}

/* ───────── 인증 차단 화면 ───────── */
.authblock{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:44px 30px;text-align:center;}
.ab-ico{font-size:44px;margin-bottom:18px;}
.authblock h1{font-family:var(--serif);font-size:25px;font-weight:700;margin:0 0 14px;}
.authblock p{color:var(--muted);font-size:15px;line-height:1.85;max-width:330px;margin:0;}
.ab-hint{margin-top:24px;font-size:12.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:15px 17px;max-width:340px;line-height:1.7;}
.ab-hint code{font-family:var(--sans);color:var(--accent-deep);font-weight:700;background:var(--accent-soft);
  padding:2px 7px;border-radius:7px;}

/* ───────── 라이선스 동의 팝업 ───────── */
.lic-backdrop{position:fixed;inset:0;z-index:70;background:rgba(20,15,8,.62);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:26px;animation:fade .25s;}
.lic-card{background:var(--surface);border:1px solid var(--line);border-radius:26px;padding:32px 26px;
  max-width:392px;width:100%;box-shadow:var(--shadow-pop);text-align:center;animation:rise .4s both;}
.lic-ico{font-size:36px;}
.lic-title{font-family:var(--serif);font-size:21px;font-weight:700;margin:14px 0 4px;}
.lic-sub{font-size:12.5px;letter-spacing:.16em;color:var(--accent-deep);font-weight:700;}
.lic-body{font-size:15px;line-height:1.9;color:var(--ink);background:var(--accent-soft);border:1px solid var(--accent-soft);
  border-radius:16px;padding:18px 18px;margin:16px 0 12px;}
.lic-body .lic-name{color:var(--accent-deep);font-weight:700;}
.lic-warn{font-size:12px;color:var(--muted);line-height:1.7;margin:0 0 20px;}
.lic-btn{width:100%;padding:16px;border-radius:15px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;
  transition:transform .1s,filter .2s;}
.lic-btn:active{transform:scale(.98);}

/* ───────── 워터마크 ───────── */
.wm-overlay{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:.05;
  background-repeat:repeat;background-position:center;}
.wm-line{display:flex;align-items:center;gap:7px;margin:2px 0 18px;font-size:12px;color:var(--muted);}
.wm-line .wm-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.wm-line b{font-weight:700;color:var(--accent-deep);}

/* ───────── 하단 고지 ───────── */
.disclaimer{margin:34px auto 4px;max-width:var(--maxw);font-size:10.5px;line-height:1.65;
  color:var(--muted);opacity:.72;text-align:center;padding:0 10px;letter-spacing:0;}

/* ───────── 문제 세트 그룹 ───────── */
.qset-group{margin-bottom:16px;animation:rise .4s both;}
.qset-glabel{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--muted);
  margin:0 2px 9px;letter-spacing:.02em;}
.qset-glabel::before{content:"";width:11px;height:2px;border-radius:2px;background:var(--accent);}
.qset-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qset-row.r3{grid-template-columns:1fr 1fr 1fr;}
.qset-row .catbtn{margin-bottom:0;padding:14px 14px;}
.qset-row .catbtn b{font-size:14.5px;}
.qset-row .catbtn span{font-size:11px;}
.catbtn.wide{margin-top:2px;}
.catbtn .done-mini{color:var(--accent);font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>

<style>
#tm-update-overlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
  padding:24px;background:rgba(10,14,26,.52);backdrop-filter:blur(2px);
  font-family:'SUIT Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  opacity:0;transition:opacity .25s ease;}
#tm-update-overlay.tm-show{opacity:1;}
#tm-update-card{width:100%;max-width:340px;background:#FFFFFF;color:#14161C;border-radius:22px;
  box-shadow:0 18px 50px rgba(30,45,90,.28);padding:26px 24px 22px;text-align:center;
  transform:translateY(8px) scale(.98);transition:transform .25s ease;}
#tm-update-overlay.tm-show #tm-update-card{transform:translateY(0) scale(1);}
#tm-update-card .tm-ico{font-size:30px;margin-bottom:10px;}
#tm-update-card .tm-title{font-size:16.5px;font-weight:700;line-height:1.5;margin:0 0 8px;letter-spacing:-.01em;}
#tm-update-card .tm-body{font-size:13.5px;color:#5A5F70;line-height:1.65;margin:0 0 20px;}
#tm-update-card .tm-btn{width:100%;padding:13px;border-radius:14px;background:#2A59C3;color:#fff;
  font-size:14.5px;font-weight:700;letter-spacing:-.01em;cursor:pointer;border:none;}
#tm-update-card .tm-btn:active{background:#1E3F91;}
@media (prefers-color-scheme: dark){
  #tm-update-card{background:#1D1D20;color:#EDEDEF;box-shadow:0 18px 50px rgba(0,0,0,.55);}
  #tm-update-card .tm-body{color:#8C8C93;}
  #tm-update-card .tm-btn{background:#4C7BE0;}
  #tm-update-card .tm-btn:active{background:#8FB0F0;}
}
</style>
<script>
(function(){
  var SEEN_KEY = 'tm_update_notice_2026_07_seen';
  var AGREED_KEY = 'hapkyeok_v2_' + encodeURIComponent(
    (function(){ try { return new URLSearchParams(location.search).get('user') || ''; } catch (e) { return ''; } })()
  ) + '_agreed';
  try { if (localStorage.getItem(SEEN_KEY)) return; } catch (e) {}
  function isAgreed(){
    try { return localStorage.getItem(AGREED_KEY) === 'true'; } catch (e) { return false; }
  }
  function show(){
    var overlay = document.createElement('div');
    overlay.id = 'tm-update-overlay';
    overlay.innerHTML =
      '<div id="tm-update-card">' +
        '<div class="tm-ico">✨</div>' +
        '<div class="tm-title">텔레마케팅 실기 합격노트가 바뀌었어요!</div>' +
        '<div class="tm-body">더 깔끔해진 색 + 추가, 수정된 기출문제들!</div>' +
        '<button class="tm-btn" id="tm-update-ok" type="button">확인했어요</button>' +
      '</div>';
    document.body.appendChild(overlay);
    requestAnimationFrame(function(){ overlay.classList.add('tm-show'); });
    document.getElementById('tm-update-ok').addEventListener('click', function(){
      try { localStorage.setItem(SEEN_KEY, '1'); } catch (e) {}
      overlay.classList.remove('tm-show');
      setTimeout(function(){ overlay.remove(); }, 250);
    });
  }
  function waitForAgree(){
    if (isAgreed()){ setTimeout(show, 400); return; }
    var iv = setInterval(function(){
      if (isAgreed()){ clearInterval(iv); setTimeout(show, 400); }
    }, 300);
  }
  waitForAgree();
})();
</script>
